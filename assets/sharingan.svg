<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" id="mangekyo">
  <!-- Outer ring with 3 curved gaps -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#ff2d55" stroke-width="10" opacity="0.9"/>
  <!-- 3 curved gap overlays to break the ring -->
  <path d="M100 12 A88 88 0 0 1 170 55" fill="none" stroke="#000" stroke-width="14"/>
  <path d="M170 145 A88 88 0 0 1 30 145" fill="none" stroke="#000" stroke-width="14"/>
  <path d="M30 55 A88 88 0 0 1 100 12" fill="none" stroke="#000" stroke-width="14"/>
  <!-- 3 curved blades -->
  <path d="M100 30 Q135 70 100 100" fill="#ff2d55" stroke="none"/>
  <path d="M100 30 Q65 70 100 100" fill="none" stroke="none"/>
  <path d="M100 100 Q135 70 100 30" fill="#ff2d55"/>
  
  <path d="M157 135 Q120 145 100 100" fill="#ff2d55"/>
  <path d="M157 135 Q145 100 100 100" fill="none"/>
  <path d="M100 100 Q145 100 157 135" fill="#ff2d55"/>
  
  <path d="M43 135 Q80 145 100 100" fill="#ff2d55"/>
  <path d="M43 135 Q55 100 100 100" fill="none"/>
  <path d="M100 100 Q55 100 43 135" fill="#ff2d55"/>
  
  <!-- Inner pupil -->
  <circle cx="100" cy="100" r="12" fill="#ff2d55"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="#000"/>
</svg>
